name: Release

on:
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf flatpak flatpak-builder libarchive-tools

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app (DEB and RPM)
        run: npm run tauri build
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
          WEBKIT_DISABLE_DMABUF_RENDERER: 1

      - name: Build Arch Package (.pkg.tar.zst)
        run: |
          mkdir -p arch_build
          cp PKGBUILD arch_build/
          cp src-tauri/target/release/bundle/deb/OptiTux_*_amd64.deb arch_build/
          docker run --rm -v $(pwd):/workspace -w /workspace/arch_build archlinux:latest bash -c "
            pacman -Sy --noconfirm --noprogressbar base-devel binutils sudo
            useradd -m builduser && chown -R builduser:builduser /workspace/arch_build
            sudo -u builduser makepkg --noconfirm --nodeps
            chown -R $(id -u):$(id -g) .
          "
          mv arch_build/*.pkg.tar.zst ./OptiTux-x86_64.pkg.tar.zst

      - name: Build Flatpak
        run: |
          mkdir -p flatpak_app
          ar x src-tauri/target/release/bundle/deb/OptiTux_*_amd64.deb
          bsdtar -xf data.tar.* -C flatpak_app/
          cp $(find flatpak_app/usr/bin -type f) flatpak_app/optitux
          
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//45 org.gnome.Sdk//45
          
          flatpak-builder --user --repo=repo --force-clean build-dir optitux-gui.json
          flatpak build-bundle repo OptiTux.flatpak com.sll.optitux-gui

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optitux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            OptiTux-x86_64.pkg.tar.zst
            OptiTux.flatpak
